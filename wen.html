function yearlyMonthlyChartHtml(items){ const width=680,height=260,padL=34,padR=18,padT=18,padB=34; const years=[...new Set(items.map(item=>item.year))].sort(); const series=years.map((year,idx)=>({year,color:COLORS[idx%COLORS.length],values:Array.from({length:12},(_,i)=>items.filter(item=>item.year===year&&item.month===String(i+1).padStart(2,'0')).length)})); const max=Math.max(1,...series.flatMap(s=>s.values)); const x=idx=>padL+idx*(width-padL-padR)/11; const y=count=>padT+(max-count)*(height-padT-padB)/max; const grids=[0,.25,.5,.75,1].map(r=>{ const gy=padT+r*(height-padT-padB); return '<line class="line-grid" x1="'+padL+'" y1="'+gy.toFixed(1)+'" x2="'+(width-padR)+'" y2="'+gy.toFixed(1)+'"/>'; }).join(''); const paths=series.map(s=>{ const path=s.values.map((count,idx)=>(idx?'L':'M')+x(idx).toFixed(1)+' '+y(count).toFixed(1)).join(' '); const dots=s.values.map((count,idx)=>'<circle cx="'+x(idx).toFixed(1)+'" cy="'+y(count).toFixed(1)+'" r="3" fill="'+s.color+'" stroke="#fff" stroke-width="1.5"><title>'+s.year+'年 '+String(idx+1).padStart(2,'0')+'月：'+count+'筆</title></circle>').join(''); return '<path class="line-path" style="stroke:'+s.color+'" d="'+path+'"/>'+dots; }).join(''); const labels=Array.from({length:12},(_,idx)=>'<text class="line-label" x="'+x(idx).toFixed(1)+'" y="'+(height-12)+'" text-anchor="middle">'+String(idx+1).padStart(2,'0')+'</text>').join(''); const legend=series.map(s=>'<span class="line-legend-item"><span class="line-legend-swatch" style="background:'+s.color+'"></span>'+s.year+'</span>').join(''); return '<div class="line-chart"><svg viewBox="0 0 '+width+' '+height+'" role="img" aria-label="每年每月報導量曲線">'+grids+'<line class="line-axis" x1="'+padL+'" y1="'+(height-padB)+'" x2="'+(width-padR)+'" y2="'+(height-padB)+'"/>'+paths+labels+'</svg><div class="line-legend">'+legend+'</div></div>'; }
function switchAnalysisRange(rangeKey){ currentAnalysisRange=rangeKey; document.querySelectorAll('.analysis-tab').forEach(btn=>btn.classList.toggle('active',btn.dataset.analysisRange===rangeKey)); renderAnalysis(); }
function renderAnalysis(){ const range=ANALYSIS_RANGES[currentAnalysisRange]; const items=rangeItems(currentAnalysisRange); const categories=countValues(items,item=>item.category); const topics=analyzeTopics(items); const entities=analyzeEntities(items); const years=countValues(items,item=>item.year); const sources=countValues(items,sourceGroup); const confidence=countValues(items,confidenceGroup); const insights=analysisInsightLines(currentAnalysisRange,items,categories,topics,entities); const interpretations=interpretationLines(currentAnalysisRange,items); document.getElementById('analysisNote').textContent=range.note+' 目前納入 '+items.length+' 筆。'; document.getElementById('analysisContent').innerHTML='<div class="analysis-grid"><div class="analysis-card"><h3>類別分析</h3>'+barsHtml(categories,items.length,8,'category')+'</div><div class="analysis-card"><h3>最常寫的議題</h3><div class="analysis-tags">'+chipsHtml(topics,14)+'</div></div><div class="analysis-card"><h3>人物統計（含 1 筆）</h3><div class="analysis-tags scroll">'+chipsHtml(entities,0,true)+'</div></div><div class="analysis-card"><h3>年度收錄量</h3>'+barsHtml(years,items.length,8,'year')+'</div><div class="analysis-card"><h3>來源結構</h3>'+barsHtml(sources,items.length,6,'source')+'</div><div class="analysis-card"><h3>資料可信度</h3>'+barsHtml(confidence,items.length,6,'confidence')+'</div><div class="analysis-card wide"><h3>每年每月報導量曲線</h3>'+yearlyMonthlyChartHtml(items)+'</div><div class="analysis-card wide"><h3>延伸分析結果</h3><ul class="analysis-suggestions">'+insights.map(item=>'<li>'+escapeHtml(item)+'</li>').join('')+'</ul></div><div class="analysis-card wide"><h3>解讀提醒</h3><ul class="analysis-suggestions">'+interpretations.map(item=>'<li>'+escapeHtml(item)+'</li>').join('')+'</ul></div></div>'; }
function renderYearTabs(){ const container=document.getElementById('yearTabs'); container.innerHTML=''; YEARS.forEach(year=>{ const btn=document.createElement('button'); btn.className='tab-btn'+(currentPage==='year'&&currentYear===year?' active':''); btn.textContent=year; btn.onclick=()=>switchYear(year); container.appendChild(btn); }); const analysisBtn=document.createElement('button'); analysisBtn.className='tab-btn analysis-page-tab'+(currentPage==='analysis'?' active':''); analysisBtn.textContent='報導分析'; analysisBtn.onclick=switchAnalysisPage; container.appendChild(analysisBtn); }
function renderMonthFilters(){ const months=[...new Set(NEWS_DATA.filter(n=>n.year===currentYear).map(n=>n.month))].sort(); const container=document.getElementById('monthFilters'); container.innerHTML=''; const allBtn=document.createElement('button'); allBtn.className='month-btn'+(currentMonth==='all'?' active':''); allBtn.textContent='全部'; allBtn.onclick=()=>{currentMonth='all';renderMonthFilters();filterNews();}; container.appendChild(allBtn); months.forEach(month=>{ const btn=document.createElement('button'); btn.className='month-btn'+(currentMonth===month?' active':''); btn.textContent=month+'月'; btn.onclick=()=>{currentMonth=month;renderMonthFilters();filterNews();}; container.appendChild(btn); }); }
function switchYear(year){ currentPage='year'; currentYear=year; currentMonth='all'; currentCategory='all'; renderYearTabs(); renderMonthFilters(); updatePageVisibility(); filterNews(); }
function switchAnalysisPage(){ currentPage='analysis'; renderYearTabs(); renderAnalysis(); updatePageVisibility(); }
function updatePageVisibility(){ const isAnalysis=currentPage==='analysis'; document.querySelector('.controls').classList.toggle('hidden',isAnalysis); document.getElementById('countBar').classList.toggle('hidden',isAnalysis); document.getElementById('newsGrid').classList.toggle('hidden',isAnalysis); document.getElementById('analysisPanel').classList.toggle('active',isAnalysis); if(isAnalysis) document.getElementById('emptyState').classList.add('hidden'); }
function globalSearchNews(){ globalSearchQuery=document.getElementById('globalSearchInput').value.trim().toLowerCase(); if(globalSearchQuery){ currentPage='year'; currentMonth='all'; currentCategory='all'; renderYearTabs(); renderMonthFilters(); updatePageVisibility(); } filterNews(); }
function searchAnalysisKeyword(keyword){ const clean=String(keyword||'').replace(/\s+\d+$/,'').trim(); document.getElementById('globalSearchInput').value=clean; globalSearchQuery=clean.toLowerCase(); currentPage='year'; currentMonth='all'; currentCategory='all'; renderYearTabs(); renderMonthFilters(); updatePageVisibility(); filterNews(); window.scrollTo({top:0,behavior:'smooth'}); }
function switchCategory(category){ currentCategory=currentCategory===category?'all':category; currentMonth='all'; renderMonthFilters(); filterNews(); }
function renderYearCategories(){ return [...new Set(NEWS_DATA.filter(n=>n.year===currentYear).map(n=>n.category).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'zh-Hant')).map(cat=>{ const active=currentCategory===cat; const dimmed=currentCategory!=='all'&&!active; return '<button type="button" class="year-cat'+(active?' active':'')+(dimmed?' dimmed':'')+'" style="background:'+getCatColor(cat)+'" onclick="switchCategory('+JSON.stringify(cat).replace(/"/g,'&quot;')+')">'+escapeHtml(cat)+'</button>'; }).join(''); }
function filterNews(){ const q=document.getElementById('searchInput').value.trim().toLowerCase(); let visible=0; document.querySelectorAll('.card').forEach(card=>{ const show=globalSearchQuery?card.dataset.search.includes(globalSearchQuery):(card.dataset.year===currentYear&&(currentMonth==='all'||card.dataset.month===currentMonth)&&(currentCategory==='all'||card.dataset.category===currentCategory)&&(!q||card.dataset.search.includes(q))); card.classList.toggle('hidden',!show); if(show) visible++; }); const categoryText=currentCategory==='all'?'全部分類':currentCategory; document.getElementById('countBar').innerHTML=globalSearchQuery?'<div class="year-status"><span>全站搜尋「'+escapeHtml(globalSearchQuery)+'」 | 顯示 '+visible+' 筆</span></div>':'<div class="year-status"><span>'+currentYear+' 年 | '+(currentMonth==='all'?'全部月份':currentMonth+' 月')+' | '+escapeHtml(categoryText)+' | 顯示 '+visible+' 筆</span><span class="year-cats">'+renderYearCategories()+'</span></div>'; document.getElementById('emptyState').classList.toggle('hidden',visible!==0); }
function renderCards(){ const grid=document.getElementById('newsGrid'); grid.innerHTML=''; NEWS_DATA.sort(byDateDesc).forEach(item=>{ const card=document.createElement('div'); card.className='card'; card.dataset.year=item.year; card.dataset.month=item.month; card.dataset.category=item.category; card.dataset.search=(item.date+' '+item.year+' '+item.title+' '+item.summary+' '+item.source+' '+item.category+' '+item.confidence).toLowerCase(); const color=getCatColor(item.category); card.innerHTML='<div class="card-top"><span class="cat-tag" style="background:'+color+'">'+escapeHtml(item.category)+'</span><span class="card-date">'+escapeHtml(item.date)+'</span></div><div class="card-title"><a href="'+escapeAttr(item.url)+'" target="_blank" rel="noopener noreferrer">'+escapeHtml(item.title)+'</a></div><div class="card-source">來源：'+escapeHtml(item.source)+'<span class="confidence">'+escapeHtml(item.confidence)+'</span></div><div class="card-summary">'+escapeHtml(item.summary||'待補摘要。')+'</div>'; grid.appendChild(card); }); }
document.getElementById('total-count').textContent='已收錄 '+NEWS_DATA.length+' 筆'; renderCards(); renderYearTabs(); renderMonthFilters(); filterNews(); renderAnalysis(); updatePageVisibility();
</script>
</body>
