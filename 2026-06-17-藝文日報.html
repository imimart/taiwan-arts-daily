let currentSection = 'taiwan';
let currentCat = 'all';

function getCategories(section){
  return [...new Set(NEWS_DATA.filter(n=>n.section===section).map(n=>n.category))];
}

function renderCatFilters(){
  const cats = getCategories(currentSection);
  const container = document.getElementById('catFilters');
  container.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'cat-btn' + (currentCat==='all' ? ' active' : '');
  allBtn.textContent = '全部';
  allBtn.style.cssText = currentCat==='all' ? 'background:#1a2744;color:#fff;border-color:#1a2744' : '';
  allBtn.onclick = () => { currentCat='all'; renderCatFilters(); filterNews(); };
  container.appendChild(allBtn);
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (currentCat===cat ? ' active' : '');
    const color = getCatColor(cat);
    const count = NEWS_DATA.filter(n => n.section === currentSection && n.category === cat).length;
    btn.textContent = cat + ' ' + count;
    if(currentCat===cat){ btn.style.cssText = 'background:' + color + ';color:#fff;border-color:' + color; }
    btn.onclick = () => { currentCat=cat; renderCatFilters(); filterNews(); };
    container.appendChild(btn);
  });
}

function filterNews(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const cards = document.querySelectorAll('.card');
  let visible = 0;
  cards.forEach(card => {
    const section = card.dataset.section;
    const category = card.dataset.category;
    const text = card.dataset.search;
    const sectionOk = q ? true : section === currentSection;
    const catOk = currentCat === 'all' || category === currentCat;
    const qOk = !q || text.includes(q);
    const show = sectionOk && catOk && qOk;
    card.classList.toggle('hidden', !show);
    if(show) visible++;
  });
  const label = SECTION_LABELS[currentSection] || '藝文新聞';
  document.getElementById('countBar').textContent = q
    ? '搜尋「' + q + '」找到 ' + visible + ' 則新聞'
    : label + ' | 顯示 ' + visible + ' 則新聞';
}

function switchTab(section){
  currentSection = section;
  currentCat = 'all';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.tab-btn[data-section]').forEach((button) => {
    button.classList.toggle('active', button.dataset.section === section);
  });
  renderCatFilters();
  filterNews();
}

function buildGrid(){
  const grid = document.getElementById('newsGrid');
  NEWS_DATA.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.section = item.section;
    card.dataset.category = item.category;
    card.dataset.search = (item.title + ' ' + item.summary + ' ' + item.source + ' ' + item.category).toLowerCase();
    const color = getCatColor(item.category);
    card.innerHTML = '<div class="card-top"><span class="cat-tag" style="background:' + color + '">' + escapeHtml(item.category) + '</span><span class="card-date">' + escapeHtml(item.date || '') + '</span></div><div class="card-title"><a href="' + escapeAttr(item.url) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(item.title) + '</a></div><div class="card-source">來源 ' + escapeHtml(item.source) + '</div><div class="card-summary">' + escapeHtml(item.summary || '原始新聞未提供摘要。') + '</div>';
    grid.appendChild(card);
  });
}

function escapeHtml(value){
  return String(value).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;");
}
function escapeAttr(value){ return escapeHtml(value).replaceAll('\x60','&#096;'); }
function openArchive(file){
  if(!file){ return; }
  window.location.href = file;
}
















































buildGrid();
renderCatFilters();
filterNews();
